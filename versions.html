<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tropic Proact — Versions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #5B2FE0;
  --purple-deep: #3516A8;
  --purple-pale: #EDE7FE;
  --lime: #E3F27D;
  --black: #141020;
  --gray-900: #1F1A2E;
  --gray-600: #5E5773;
  --gray-400: #8C849E;
  --gray-200: #D8D3E2;
  --gray-100: #EFECF5;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; background: var(--gray-900); color: var(--white); }

.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
  transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.app.collapsed { grid-template-columns: 56px 1fr; }
.app.hidden-sidebar { grid-template-columns: 0 1fr; }

/* ── Sidebar ── */
.sidebar {
  background: linear-gradient(180deg, #1F1A2E 0%, #141020 100%);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  min-width: 0;
}
.sidebar-header {
  padding: 1.1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  min-height: 58px;
}
.sidebar-logo-img {
  width: auto;
  height: 22px;
  display: block;
  flex-shrink: 0;
}
.sidebar-title {
  font-size: 0.92rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  white-space: nowrap;
  color: var(--white);
}
.sidebar-title em {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  color: var(--lime);
  letter-spacing: 0;
}

.sidebar-section-label {
  padding: 1.25rem 1.25rem 0.5rem;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gray-400);
  white-space: nowrap;
}

.version-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 0.75rem;
  list-style: none;
}

.version-item {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 0.75rem 0.75rem;
  margin-bottom: 0.3rem;
  cursor: pointer;
  text-align: left;
  color: rgba(255,255,255,0.65);
  font-family: inherit;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.version-item:hover {
  background: rgba(255,255,255,0.04);
  color: var(--white);
}

.version-item.active {
  background: rgba(91,47,224,0.18);
  border-color: rgba(91,47,224,0.35);
  color: var(--white);
}

.version-dot {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--gray-400);
  flex-shrink: 0;
  font-weight: 400;
}

.version-item.active .version-dot {
  background: var(--lime);
  color: var(--purple-deep);
  font-weight: 500;
}

.version-text { flex: 1; min-width: 0; }

.version-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: inherit;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.version-meta {
  font-size: 0.68rem;
  color: var(--gray-400);
  margin-top: 0.12rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.version-item.active .version-meta { color: rgba(227,242,125,0.65); }

.sidebar-footer {
  padding: 0.85rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 0.7rem;
  color: var(--gray-400);
  line-height: 1.4;
}

.sidebar-footer kbd {
  font-family: 'Inter', sans-serif;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 0.1rem 0.4rem;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--lime);
}

/* Collapse toggle */
.collapse-toggle {
  position: absolute;
  top: 14px;
  right: 12px;
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 7px;
  color: var(--gray-400);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  transition: background 0.15s, color 0.15s;
}
.collapse-toggle:hover { background: rgba(255,255,255,0.1); color: var(--white); }

/* Collapsed sidebar tweaks */
.app.collapsed .sidebar-title,
.app.collapsed .sidebar-section-label,
.app.collapsed .version-name,
.app.collapsed .version-meta,
.app.collapsed .sidebar-footer { display: none; }
.app.collapsed .sidebar-header { padding: 1.1rem 0.85rem; justify-content: center; }
.app.collapsed .version-list { padding: 0 0.45rem; }
.app.collapsed .version-item { padding: 0.5rem; justify-content: center; }
.app.collapsed .collapse-toggle { right: -14px; top: 14px; background: var(--purple); color: var(--lime); z-index: 10; }

/* ── Main content / iframe area ── */
.main {
  position: relative;
  background: var(--white);
  overflow: hidden;
}

.main-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Floating show-sidebar button (when hidden) */
.show-sidebar-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  width: 36px;
  height: 36px;
  background: rgba(20,16,32,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: var(--lime);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  z-index: 1000;
}
.app.hidden-sidebar .show-sidebar-btn { display: flex; }
.show-sidebar-btn:hover { background: var(--purple); color: var(--white); }

@media (max-width: 768px) {
  .app { grid-template-columns: 0 1fr; }
  .app .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; z-index: 50; transform: translateX(-100%); transition: transform 0.25s; }
  .app:not(.hidden-sidebar) .sidebar { transform: translateX(0); }
  .app .show-sidebar-btn { display: flex; }
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="tropic-icon.svg" alt="" class="sidebar-logo-img">
      <div class="sidebar-title">Tropic <em>Proact</em></div>
      <button class="collapse-toggle" id="collapseBtn" title="Hide sidebar (\\)">‹</button>
    </div>

    <div class="sidebar-section-label">Versions</div>
    <ul class="version-list" id="versionList">
      <!-- Filled by JS -->
    </ul>

    <div class="sidebar-footer">
      <div style="margin-bottom:0.35rem;"><kbd>[</kbd> <kbd>]</kbd> cycle versions</div>
      <div style="margin-bottom:0.35rem;"><kbd>\\</kbd> hide sidebar</div>
      <div><kbd>P</kbd> present mode</div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <iframe id="mainFrame" class="main-iframe" src="v9.html" title="Tropic Proact Presentation"></iframe>
  </main>

  <button class="show-sidebar-btn" id="showSidebarBtn" title="Show sidebar">☰</button>
</div>

<script>
const VERSIONS = [
  {
    id: 'v9',
    name: 'v9 — Current',
    meta: 'Apr 17 · Conclusion slide + Thank You reordered',
    file: 'v9.html'
  },
  {
    id: 'v8',
    name: 'v8',
    meta: 'Apr 17 · Moat front-loaded in subhead',
    file: 'v8.html'
  },
  {
    id: 'v7',
    name: 'v7',
    meta: 'Apr 17 · Features row added to pillars',
    file: 'v7.html'
  },
  {
    id: 'v6',
    name: 'v6',
    meta: 'Apr 17 · Scope-tight polish',
    file: 'v6.html'
  },
  {
    id: 'v5',
    name: 'v5',
    meta: 'Apr 17 · Signal Response Guide',
    file: 'v5.html'
  },
  {
    id: 'v4',
    name: 'v4',
    meta: 'Apr 17 · Top 3 GTM priorities reframe',
    file: 'v4.html'
  },
  {
    id: 'v3',
    name: 'v3',
    meta: 'Apr 17 · Canvas + pillars polish',
    file: 'v3.html'
  },
  {
    id: 'v2',
    name: 'v2',
    meta: 'Apr 17 · Feedback incorporated',
    file: 'v2.html'
  },
  {
    id: 'v1',
    name: 'v1 — Initial',
    meta: 'Apr 17 · First draft',
    file: 'v1.html'
  }
];

const app = document.getElementById('app');
const list = document.getElementById('versionList');
const frame = document.getElementById('mainFrame');
const collapseBtn = document.getElementById('collapseBtn');
const showBtn = document.getElementById('showSidebarBtn');

let activeId = 'v9';

function render() {
  list.innerHTML = '';
  VERSIONS.forEach((v, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'version-item' + (v.id === activeId ? ' active' : '');
    btn.title = v.name;
    btn.innerHTML = `
      <div class="version-dot">${v.id.replace('v','')}</div>
      <div class="version-text">
        <div class="version-name">${v.name}</div>
        <div class="version-meta">${v.meta}</div>
      </div>
    `;
    btn.addEventListener('click', () => selectVersion(v.id));
    li.appendChild(btn);
    list.appendChild(li);
  });
}

function selectVersion(id) {
  const v = VERSIONS.find(x => x.id === id);
  if (!v || id === activeId) return;
  activeId = id;
  frame.src = v.file;
  render();
  try { history.replaceState(null, '', '#' + id); } catch (e) {}
}

function cycleVersion(dir) {
  const idx = VERSIONS.findIndex(v => v.id === activeId);
  const next = (idx + dir + VERSIONS.length) % VERSIONS.length;
  selectVersion(VERSIONS[next].id);
}

/* Sidebar collapse/hide */
collapseBtn.addEventListener('click', () => {
  if (app.classList.contains('collapsed')) {
    app.classList.remove('collapsed');
    collapseBtn.textContent = '‹';
  } else {
    app.classList.add('collapsed');
    collapseBtn.textContent = '›';
  }
});
showBtn.addEventListener('click', () => {
  app.classList.remove('hidden-sidebar');
});

/* Keyboard shortcuts — don't fire while iframe has focus typing */
document.addEventListener('keydown', handleKey);
function handleKey(e) {
  const target = e.target;
  if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') return;
  if (e.key === '[') { e.preventDefault(); cycleVersion(-1); }
  else if (e.key === ']') { e.preventDefault(); cycleVersion(1); }
  else if (e.key === '\\') {
    e.preventDefault();
    app.classList.toggle('hidden-sidebar');
  }
}

/* Listen for present-mode events from iframe — auto-hide sidebar */
window.addEventListener('message', (e) => {
  if (!e.data || e.data.type !== 'presentMode') return;
  if (e.data.on) {
    app.classList.add('hidden-sidebar');
  } else {
    app.classList.remove('hidden-sidebar');
  }
});

/* Forward keydown from inside iframe to top-level so shortcuts work even when iframe has focus */
frame.addEventListener('load', () => {
  try {
    frame.contentWindow.document.addEventListener('keydown', (e) => {
      // Only forward our wrapper shortcuts
      if (e.key === '[' || e.key === ']' || e.key === '\\') {
        handleKey(e);
      }
    });
  } catch (err) { /* cross-origin — ignore */ }
});

/* Deep-link support via hash (#v1, #v2) */
const initial = (location.hash || '').replace('#','');
if (VERSIONS.find(v => v.id === initial)) {
  activeId = initial;
  frame.src = VERSIONS.find(v => v.id === initial).file;
}

render();
</script>
</body>
</html>
